<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Playing Cards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=2.0" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="badge">CSS Flexbox Layout</div>
      </header>

      <main class="playing-cards-container">
        <div class="playing-card suit-spades">
          <div class="card-corner top-left">
            <span class="value">A</span>
            <span class="suit">♠</span>
          </div>
          <div class="card-center">♠</div>
          <div class="card-corner bottom-right">
            <span class="value">A</span>
            <span class="suit">♠</span>
          </div>
        </div>

        <div class="playing-card suit-hearts">
          <div class="card-corner top-left">
            <span class="value">K</span>
            <span class="suit">♥</span>
          </div>
          <div class="card-center">♥</div>
          <div class="card-corner bottom-right">
            <span class="value">K</span>
            <span class="suit">♥</span>
          </div>
        </div>
        <div class="playing-card suit-diamonds">
          <div class="card-corner top-left">
            <span class="value">Q</span>
            <span class="suit">♦</span>
          </div>
          <div class="card-center">♦</div>
          <div class="card-corner bottom-right">
            <span class="value">Q</span>
            <span class="suit">♦</span>
          </div>
        </div>
        <div class="playing-card suit-clubs">
          <div class="card-corner top-left">
            <span class="value">J</span>
            <span class="suit">♣</span>
          </div>
          <div class="card-center">♣</div>
          <div class="card-corner bottom-right">
            <span class="value">J</span>
            <span class="suit">♣</span>
          </div>
        </div>
        <div class="playing-card suit-spades">
          <div class="card-corner top-left">
            <span class="value">10</span>
            <span class="suit">♠</span>
          </div>
          <div class="card-center">♠</div>
          <div class="card-corner bottom-right">
            <span class="value">10</span>
            <span class="suit">♠</span>
          </div>
        </div>
        <div class="playing-card suit-hearts">
          <div class="card-corner top-left">
            <span class="value">A</span>
            <span class="suit">♥</span>
          </div>
          <div class="card-center">♥</div>
          <div class="card-corner bottom-right">
            <span class="value">A</span>
            <span class="suit">♥</span>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
